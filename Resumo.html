<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Ambiente de Estudos</title>
    <style>
        :root {
            --primary: #00d4ff;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --accent: #38bdf8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        nav {
            width: 250px;
            background-color: #020617;
            padding: 20px;
            border-right: 1px solid #334155;
        }

        nav h2 { color: var(--primary); font-size: 1.2rem; }

        .btn-materia {
            display: block;
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            background: transparent;
            border: 1px solid var(--accent);
            color: white;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
        }

        .btn-materia:hover { background: var(--accent); color: var(--bg); }

        /* Área Principal */
        main {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        #titulo-materia {
            border-bottom: 2px solid var(--primary);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        /* Editor Esquematizado */
        .editor-container {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        textarea {
            width: 100%;
            height: 400px;
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 1rem;
            line-height: 1.6;
            resize: none;
            outline: none;
        }

        .controles {
            margin-top: 20px;
            display: flex;
            gap: 15px;
        }

        .btn-save {
            background: #22c55e;
            border: none;
            padding: 10px 20px;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .instrucoes {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <nav>
        <h2>Disciplinas</h2>
        <button class="btn-materia" onclick="abrirMateria('Português')">Português</button>
        <button class="btn-materia" onclick="abrirMateria('Informática')">Informática</button>
        <button class="btn-materia" onclick="abrirMateria('Direito')">Direito</button>
        <button class="btn-materia" onclick="abrirMateria('Matemática')">Matemática</button>
    </nav>

    <main>
        <div class="container">
            <h1 id="titulo-materia">Selecione uma matéria</h1>
            
            <div id="editor-area" style="display: none;">
                <div class="editor-container">
                    <textarea id="texto-resumo" placeholder="Comece seu resumo esquematizado aqui...
Use tópicos:
• Assunto Principal
  - Subtópico
  - Detalhe importante"></textarea>
                </div>

                <div class="controles">
                    <button class="btn-save" onclick="salvarResumo()">Salvar Alterações</button>
                    <span id="status-salvamento" style="font-size: 0.9rem;"></span>
                </div>
                <p class="instrucoes">As anotações ficam salvas automaticamente no seu navegador.</p>
            </div>
        </div>
    </main>

    <script>
        let materiaAtual = "";

        function abrirMateria(materia) {
            materiaAtual = materia;
            document.getElementById('titulo-materia').innerText = materia;
            document.getElementById('editor-area').style.display = 'block';
            
            // Carregar dados salvos
            const salvo = localStorage.getItem('resumo_' + materia);
            document.getElementById('texto-resumo').value = salvo ? salvo : "";
            document.getElementById('status-salvamento').innerText = "";
        }

        function salvarResumo() {
            if (!materiaAtual) return;
            
            const conteudo = document.getElementById('texto-resumo').value;
            localStorage.setItem('resumo_' + materiaAtual, conteudo);
            
            const status = document.getElementById('status-salvamento');
            status.innerText = "✅ Salvo com sucesso!";
            status.style.color = "#22c55e";
            
            setTimeout(() => { status.innerText = ""; }, 2000);
        }

        // Atalho de teclado: Ctrl + S para salvar
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 's') {
                e.preventDefault();
                salvarResumo();
            }
        });
    </script>
</body>
</html>
